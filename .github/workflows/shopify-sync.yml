name: Shopify Sync

on:
  schedule:
    - cron: "0 6 * * 1"  # Tous les lundis à 06h00 UTC

  workflow_dispatch:

jobs:
  sync:
    name: Fetch & commit products.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch Shopify products
        env:
          SHOPIFY_DOMAIN:            ${{ secrets.SHOPIFY_DOMAIN }}
          SHOPIFY_STOREFRONT_TOKEN:  ${{ secrets.SHOPIFY_STOREFRONT_TOKEN }}
        run: node scripts/shopify-fetch.js

      - name: Commit updated products.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/products.json
          git diff --cached --quiet || git commit -m "chore: update products.json"
          git push