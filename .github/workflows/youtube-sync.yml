# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/youtube-sync.yml
# Runs every day at 06:00 UTC, fetches latest YouTube videos,
# commits the updated episodes.json back to the repo.
# The static site then serves the fresh JSON with zero server logic.
# ─────────────────────────────────────────────────────────────────────────────

name: YouTube Sync

on:
  schedule:
    - cron: "0 4 * * *"    # → 06h00 France
    - cron: "30 9 * * *"   # → 11h30 France
    - cron: "0 16 * * *"   # → 18h00 France
    #- cron: "0 6 * * *"   # every day at 06:00 UTC

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  sync:
    name: Fetch & commit episodes.json
    runs-on: ubuntu-latest

    steps:
      # 1 — Checkout the repo
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # 2 — Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: "22"
          cache: "npm"

      # 3 — Install dependencies (only what the script needs)
      - name: Install dependencies
        run: npm ci

      # 4 — Run the fetch script
      - name: Fetch YouTube data
        env:
          #YOUTUBE_API_KEY:    ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: node scripts/youtube-fetch.js

      # 5 — Commit updated JSON if it changed
      - name: Commit updated episodes.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/episodes.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update episodes.json [skip ci]"
          git push
