# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/deploy.yml
# Déploiement automatique sur GitHub Pages à chaque push sur main
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  # Permet de déclencher manuellement depuis GitHub Actions UI
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1 — Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2 — Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3 — Install
      - name: Install dependencies
        run: npm ci

      # 4 — Build
      - name: Build
        env:
          VITE_MAIN_URL: ${{ vars.VITE_MAIN_URL }}
          VITE_SHOP_URL: ${{ vars.VITE_SHOP_URL }}
        run: npm run build

      # 5 — Deploy
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: www.sololaveritestudio.com  # même valeur que public/CNAME